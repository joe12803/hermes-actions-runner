name: Hermes Agent Runner
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'The task or query for Hermes'
        required: false
      run_gateway:
        description: 'Run as Feishu Gateway'
        type: boolean
        default: false
      run_webui:
        description: 'Start CloudCLI Web UI with Cloudflare Tunnel'
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js (for Web UI)
        if: github.event.inputs.run_webui == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Cloudflared
        if: github.event.inputs.run_webui == 'true'
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Install CloudCLI (Web UI)
        if: github.event.inputs.run_webui == 'true'
        run: |
          npm install -g @cloudcli-ai/cloudcli

      - name: Configure Hermes
        env:
          CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          mkdir -p ~/.hermes
          # Fix custom_providers to be a list
          # Set GATEWAY_ALLOW_ALL_USERS to bypass allowlist
          cat <<EOF > ~/.hermes/config.yaml
          model:
            default: gemini-3-flash
            provider: openclaw
          
          custom_providers:
            - name: openclaw
              base_url: https://openclaw.994938.xyz/v1
              api_key: "${CUSTOM_API_KEY}"
          
          gateway:
            platforms:
              feishu:
                enabled: true
                app_id: "${FEISHU_APP_ID}"
                app_secret: "${FEISHU_APP_SECRET}"
          
          approvals:
            mode: off
          
          terminal:
            backend: local
          EOF
          
          # Use .env for critical gateway flags
          echo "GATEWAY_ALLOW_ALL_USERS=true" > ~/.hermes/.env
          echo "FEISHU_APP_ID=${FEISHU_APP_ID}" >> ~/.hermes/.env
          echo "FEISHU_APP_SECRET=${FEISHU_APP_SECRET}" >> ~/.hermes/.env

      - name: Start Web UI and Tunnel
        if: github.event.inputs.run_webui == 'true'
        run: |
          cloudcli start --port 3001 &
          cloudflared tunnel --url http://localhost:3001 &
          sleep 10

      - name: Run Hermes Gateway
        if: github.event.inputs.run_gateway == 'true'
        run: |
          # Use env to ensure platforms are picked up
          export GATEWAY_ALLOW_ALL_USERS=true
          hermes gateway run

      - name: Run Single Query
        if: github.event.inputs.query != '' && github.event.inputs.run_gateway != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          hermes chat -q "${{ github.event.inputs.query }}"

      - name: Sync Results (Optional)
        if: always() && github.event.inputs.run_gateway != 'true'
        run: |
          mkdir -p .hermes-data/sessions
          cp -r ~/.hermes/sessions/* .hermes-data/sessions/ || true
          git config --global user.name "hermes-agent[bot]"
          git config --global user.email "hermes-agent[bot]@users.noreply.github.com"
          git add .hermes-data
          git commit -m "docs: archive hermes session results" || echo "No changes to commit"
          git push origin main || echo "Push failed"
