name: Hermes Agent Runner
on:
  workflow_dispatch:
    inputs:
      query:
        description: 'The task or query for Hermes'
        required: false
      run_gateway:
        description: 'Run as Gateway (Feishu/Telegram)'
        type: boolean
        default: false
      run_webui:
        description: 'Start CloudCLI Web UI with Cloudflare Tunnel'
        type: boolean
        default: false
      pairing_command:
        description: 'Command to run (e.g. /approve pairing_code)'
        required: false
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js (for Web UI)
        if: github.event.inputs.run_webui == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Hermes Agent
        run: |
          curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configure Hermes
        env:
          CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USER: ${{ secrets.TELEGRAM_ALLOWED_USER }}
        run: |
          mkdir -p ~/.hermes
          cat <<EOF > ~/.hermes/config.yaml
          model:
            default: gemini-3-flash
            provider: openclaw
          
          custom_providers:
            - name: openclaw
              base_url: https://openclaw.994938.xyz/v1
              api_key: "${CUSTOM_API_KEY}"
          
          gateway:
            allow_all_users: true
            platforms:
              feishu:
                enabled: ${FEISHU_APP_ID:+true}
                app_id: "${FEISHU_APP_ID}"
                app_secret: "${FEISHU_APP_SECRET}"
              telegram:
                enabled: ${TELEGRAM_BOT_TOKEN:+true}
                token: "${TELEGRAM_BOT_TOKEN}"
                allowed_users: ["${TELEGRAM_ALLOWED_USER}"]
          
          approvals:
            mode: off
          
          terminal:
            backend: local
          EOF
          
          cat <<EOF > ~/.hermes/.env
          OPENCLAW_API_KEY=${CUSTOM_API_KEY}
          FEISHU_ENABLED=${FEISHU_APP_ID:+true}
          FEISHU_APP_ID=${FEISHU_APP_ID}
          FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
          TELEGRAM_ENABLED=${TELEGRAM_BOT_TOKEN:+true}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USER}
          GATEWAY_ALLOW_ALL_USERS=true
          EOF

      - name: Pairing Approval
        if: github.event.inputs.pairing_command != ''
        run: |
          # The command should be something like: hermes pairing approve feishu 23BKDLWV
          ${{ github.event.inputs.pairing_command }}

      - name: Start Web UI and Tunnel
        if: github.event.inputs.run_webui == 'true'
        run: |
          npm install -g @cloudcli-ai/cloudcli
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudcli start --port 3001 &
          cloudflared tunnel --url http://localhost:3001 &
          sleep 15

      - name: Run Hermes Gateway
        if: github.event.inputs.run_gateway == 'true'
        run: |
          hermes gateway run
